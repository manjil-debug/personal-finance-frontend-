version: "3.9"

services:
  frontend:
    build:
      context: .
      args:
        VITE_API_URL: http://api:8000/api/v1
    container_name: finance_frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    networks:
      - finance-bridge

networks:
  finance-bridge:
    external: true