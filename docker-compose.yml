version: "3.8"

services:
  frontend:
    build: .
    ports:
      - "3000:80"   # 👈 host:container
    depends_on:
      - backend
    environment:
      - VITE_API_URL=http://backend:8000/api/v1

  backend:
    build: ../personal-finance-backend
    ports:
      - "8000:8000"
    env_file:
      - ../personal-finance-backend/.env